<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMS — Last Man Standing Advisor</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d28;
      --border: #2a2d3a;
      --text: #e1e4ec;
      --muted: #8b8fa3;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --orange: #f97316;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .header h1 span { color: var(--accent); }
    .header-links { display: flex; gap: 16px; align-items: center; }
    .header-links a {
      font-size: 12px; color: var(--accent); text-decoration: none;
    }
    .header-links a:hover { text-decoration: underline; }

    .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }

    /* Game selector bar */
    .game-bar {
      display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap;
    }
    .game-bar select, .game-bar input, .game-bar button {
      font-family: inherit; font-size: 13px;
      background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 12px;
    }
    .game-bar button {
      cursor: pointer; background: var(--accent); border-color: var(--accent);
      font-weight: 600; color: #fff;
    }
    .game-bar button:hover { opacity: 0.9; }
    .game-bar button.secondary {
      background: transparent; border-color: var(--border); color: var(--muted);
    }

    /* Section labels */
    .section-label {
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 24px 0 10px; padding-left: 4px;
    }

    /* Pick history */
    .picks-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px; margin-bottom: 16px;
    }
    .pick-chip {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      font-size: 12px; display: flex; flex-direction: column; gap: 3px;
      position: relative;
    }
    .pick-chip .gw { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; }
    .pick-chip .team { font-weight: 700; font-size: 14px; }
    .pick-chip .result { font-weight: 700; font-size: 11px; }
    .pick-chip .result-W { color: var(--green); }
    .pick-chip .result-L { color: var(--red); }
    .pick-chip .result-D { color: var(--yellow); }
    .pick-chip .remove-btn {
      position: absolute; top: 4px; right: 6px;
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; line-height: 1;
    }
    .pick-chip .remove-btn:hover { color: var(--red); }

    /* Add pick row */
    .add-pick-row {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;
    }
    .add-pick-row select, .add-pick-row input, .add-pick-row button {
      font-family: inherit; font-size: 13px;
      background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 12px;
    }
    .add-pick-row button {
      cursor: pointer; background: var(--green); border-color: var(--green);
      font-weight: 600; color: #fff;
    }
    .add-pick-row input[type="number"] { width: 70px; }

    /* Recommendation hero */
    .rec-hero {
      background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(34,197,94,0.08));
      border: 1px solid var(--accent);
      border-radius: 12px; padding: 20px; margin-bottom: 20px;
    }
    .rec-hero .top-line {
      display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px;
    }
    .rec-hero .pick-team { font-size: 28px; font-weight: 800; }
    .rec-hero .pick-detail { font-size: 14px; color: var(--muted); }
    .rec-hero .stats-row {
      display: flex; gap: 24px; margin-top: 12px; flex-wrap: wrap;
    }
    .rec-hero .stat {
      font-size: 12px; color: var(--muted);
    }
    .rec-hero .stat strong {
      display: block; font-size: 18px; color: var(--text); font-weight: 700;
    }

    /* Plan table */
    .plan-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
      margin-bottom: 20px;
    }
    .plan-table th {
      text-align: left; padding: 8px 12px;
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.3px; border-bottom: 1px solid var(--border);
    }
    .plan-table td {
      padding: 10px 12px; border-bottom: 1px solid var(--border);
    }
    .plan-table tr:first-child td {
      background: rgba(59,130,246,0.06); font-weight: 600;
    }
    .plan-table .prob-bar {
      display: inline-block; height: 6px; border-radius: 3px;
      background: var(--accent); margin-right: 8px; vertical-align: middle;
    }
    .plan-table .venue { font-size: 11px; color: var(--muted); margin-left: 4px; }
    .plan-table .src-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.3px; margin-left: 6px; vertical-align: middle;
    }
    .src-market { background: rgba(34,197,94,0.15); color: var(--green); }
    .src-model  { background: rgba(234,179,8,0.15); color: var(--yellow); }

    /* All options table */
    .opts-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .opts-table th {
      text-align: left; padding: 8px 12px;
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.3px; border-bottom: 1px solid var(--border);
    }
    .opts-table td {
      padding: 8px 12px; border-bottom: 1px solid var(--border);
    }
    .opts-table tr:first-child td { font-weight: 600; }
    .opts-table .venue { font-size: 11px; color: var(--muted); margin-left: 4px; }
    .opts-table .src-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.3px; margin-left: 6px; vertical-align: middle;
    }

    /* GW config toggles */
    .gw-toggles {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .gw-toggle {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px;
      font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text);
      transition: all .15s;
    }
    .gw-toggle.excluded {
      opacity: 0.35; text-decoration: line-through; color: var(--muted);
    }
    .gw-toggle:hover { border-color: var(--accent); }

    .loading {
      text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }

    @media (max-width: 600px) {
      .picks-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .rec-hero .pick-team { font-size: 22px; }
      .rec-hero .stats-row { gap: 16px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1><span>LMS</span> &mdash; Last Man Standing</h1>
  <div class="header-links">
    <a href="/">← Fixtures / Market</a>
  </div>
</div>

<div class="container">

  <!-- Game selector -->
  <div class="game-bar">
    <select id="gameSelect"><option value="">Loading…</option></select>
    <button class="secondary" id="newGameBtn">+ New Game</button>
    <button id="solveBtn" disabled>Run Solver</button>
  </div>

  <!-- Pick History -->
  <div id="picksSection" style="display:none">
    <div class="section-label">Used Picks</div>
    <div class="picks-grid" id="picksGrid"></div>

    <div class="section-label">Add a Pick</div>
    <div class="add-pick-row">
      <input type="number" id="pickGw" placeholder="GW" min="1" max="38" />
      <select id="pickTeam"><option value="">Select team…</option></select>
      <select id="pickResult">
        <option value="">Pending</option>
        <option value="W">Won ✓</option>
        <option value="D">Draw</option>
        <option value="L">Lost ✗</option>
      </select>
      <button id="addPickBtn">Add Pick</button>
    </div>
  </div>

  <!-- GW Config -->
  <div id="gwSection" style="display:none">
    <div class="section-label">Gameweek Inclusion (click to toggle)</div>
    <div class="gw-toggles" id="gwToggles"></div>
  </div>

  <!-- Solver Output -->
  <div id="solverOutput"></div>

</div>

<script>
const API = '';
let allTeams = [];
let currentGameId = null;
let currentGameData = null;

// ---- Helpers ----

async function fetchJson(url, opts) {
  const res = await fetch(API + url, opts);
  return res.json();
}

function postJson(url, body) {
  return fetchJson(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

// ---- Load teams (for pick dropdown) ----

async function loadTeams() {
  const data = await fetchJson('/api/lms/teams');
  allTeams = data.teams || [];
  const sel = document.getElementById('pickTeam');
  sel.innerHTML = '<option value="">Select team…</option>';
  for (const t of allTeams) {
    sel.innerHTML += `<option value="${t.id}">${t.name} (${t.elo})</option>`;
  }
}

// ---- Games ----

async function loadGames() {
  const data = await fetchJson('/api/lms/games');
  const games = data.games || [];
  const sel = document.getElementById('gameSelect');
  sel.innerHTML = '';
  if (!games.length) {
    sel.innerHTML = '<option value="">No games — create one</option>';
    document.getElementById('solveBtn').disabled = true;
    document.getElementById('picksSection').style.display = 'none';
    document.getElementById('gwSection').style.display = 'none';
    return;
  }
  for (const g of games) {
    const label = `${g.name} (${g.picks?.length || 0} picks · ${g.status})`;
    sel.innerHTML += `<option value="${g.id}">${label}</option>`;
  }
  currentGameId = games[0].id;
  currentGameData = games[0];
  document.getElementById('solveBtn').disabled = false;
  document.getElementById('picksSection').style.display = '';
  renderPicks();
}

function renderPicks() {
  if (!currentGameData) return;
  const grid = document.getElementById('picksGrid');
  const picks = currentGameData.picks || [];
  if (!picks.length) {
    grid.innerHTML = '<div class="empty">No picks yet.</div>';
    return;
  }
  const teamMap = {};
  for (const t of allTeams) teamMap[t.id] = t.name;

  grid.innerHTML = picks.map(p => `
    <div class="pick-chip">
      <span class="gw">GW ${p.gameweek}</span>
      <span class="team">${teamMap[p.team_id] || p.team_id}</span>
      ${p.result ? `<span class="result result-${p.result}">${p.result === 'W' ? 'Won ✓' : p.result === 'D' ? 'Draw' : 'Lost ✗'}</span>` : '<span class="result" style="color:var(--muted)">Pending</span>'}
      <button class="remove-btn" data-gw="${p.gameweek}" title="Remove">&times;</button>
    </div>
  `).join('');

  grid.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const gw = btn.dataset.gw;
      await fetchJson(`/api/lms/games/${currentGameId}/picks/${gw}`, { method: 'DELETE' });
      await loadGames();
    });
  });
}

// ---- GW Config ----

function renderGwConfig(included, excluded) {
  const container = document.getElementById('gwToggles');
  const allGws = [...(included || []), ...(excluded || [])].sort((a, b) => a - b);
  const excludedSet = new Set(excluded || []);

  container.innerHTML = allGws.map(gw => {
    const cls = excludedSet.has(gw) ? 'gw-toggle excluded' : 'gw-toggle';
    return `<button class="${cls}" data-gw="${gw}">GW ${gw}</button>`;
  }).join('');

  container.querySelectorAll('.gw-toggle').forEach(btn => {
    btn.addEventListener('click', async () => {
      const gw = parseInt(btn.dataset.gw);
      const wasExcluded = btn.classList.contains('excluded');
      await postJson(`/api/lms/games/${currentGameId}/gw-config`, {
        gameweek: gw, included: wasExcluded,
      });
      btn.classList.toggle('excluded');
    });
  });
}

// ---- Solver ----

async function runSolver() {
  const output = document.getElementById('solverOutput');
  output.innerHTML = '<div class="loading"><div class="spinner"></div>Running solver…</div>';
  document.getElementById('gwSection').style.display = '';

  try {
    const data = await fetchJson(`/api/lms/games/${currentGameId}/recommend`);

    if (data.error) {
      output.innerHTML = `<div class="empty">${data.error}</div>`;
      return;
    }

    renderGwConfig(data.included_gws, data.excluded_gws);

    // Update used picks display
    if (data.used_teams?.length) {
      currentGameData = { ...currentGameData, picks: data.used_teams.map(t => ({ gameweek: t.gameweek, team_id: t.team_id, result: t.result })) };
      renderPicks();
    }

    const plan = data.picks_plan || [];
    const allOpts = data.all_options || [];

    if (!plan.length) {
      output.innerHTML = '<div class="empty">No fixtures available for planning.</div>';
      return;
    }

    const top = plan[0];
    let html = '';

    // Hero recommendation
    const srcBadge = (s) => `<span class="src-badge src-${s}">${s}</span>`;
    html += `
    <div class="rec-hero">
      <div class="top-line">
        <span class="pick-team">${top.team_name || 'No pick'}</span>
        <span class="pick-detail">${top.is_home ? 'Home' : 'Away'} vs ${top.opponent_name} · GW${top.gameweek}</span>
      </div>
      <div class="stats-row">
        <div class="stat"><strong>${top.win_prob}%</strong>Win prob ${srcBadge(top.source || 'model')}</div>
        <div class="stat"><strong>${data.survival_prob}%</strong>Survival (${data.horizon} GWs)</div>
        <div class="stat"><strong>${data.horizon}</strong>Planning horizon</div>
        <div class="stat"><strong>${data.expected_duration}</strong>Avg game length</div>
      </div>
    </div>`;

    // Plan table
    if (plan.length > 1) {
      html += '<div class="section-label">Optimal Pick Sequence</div>';
      html += `<table class="plan-table">
        <thead><tr><th>GW</th><th>Team</th><th>Opponent</th><th>Win %</th><th>Source</th></tr></thead>
        <tbody>`;
      for (const p of plan) {
        const barW = Math.max(4, Math.round(p.win_prob));
        const src = p.source || 'model';
        html += `<tr>
          <td>GW${p.gameweek}</td>
          <td>${p.team_name || '—'}<span class="venue">${p.is_home ? '(H)' : '(A)'}</span></td>
          <td>${p.opponent_name || '—'}</td>
          <td><span class="prob-bar" style="width:${barW}px"></span>${p.win_prob}%</td>
          <td><span class="src-badge src-${src}">${src}</span></td>
        </tr>`;
      }
      html += '</tbody></table>';
    }

    // All options for current GW
    if (allOpts.length) {
      html += `<div class="section-label">All Options — GW${data.current_gw}</div>`;
      html += `<table class="opts-table">
        <thead><tr><th>#</th><th>Team</th><th>Opponent</th><th>Win %</th><th>Source</th></tr></thead>
        <tbody>`;
      allOpts.forEach((o, i) => {
        const src = o.source || 'model';
        html += `<tr>
          <td>${i + 1}</td>
          <td>${o.team_name}<span class="venue">${o.is_home ? '(H)' : '(A)'}</span></td>
          <td>${o.opponent_name}</td>
          <td>${o.win_prob}%</td>
          <td><span class="src-badge src-${src}">${src}</span></td>
        </tr>`;
      });
      html += '</tbody></table>';
    }

    output.innerHTML = html;

  } catch (err) {
    output.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

// ---- Event handlers ----

document.getElementById('solveBtn').addEventListener('click', runSolver);

document.getElementById('newGameBtn').addEventListener('click', async () => {
  const name = prompt('Game name:', `Game ${new Date().toLocaleDateString()}`);
  if (!name) return;
  await postJson('/api/lms/games', { name });
  await loadGames();
});

document.getElementById('gameSelect').addEventListener('change', async function () {
  currentGameId = this.value;
  // Reload game data
  const data = await fetchJson('/api/lms/games');
  const games = data.games || [];
  currentGameData = games.find(g => g.id === currentGameId) || null;
  document.getElementById('solveBtn').disabled = !currentGameId;
  document.getElementById('picksSection').style.display = currentGameId ? '' : 'none';
  document.getElementById('gwSection').style.display = 'none';
  document.getElementById('solverOutput').innerHTML = '';
  renderPicks();
});

document.getElementById('addPickBtn').addEventListener('click', async () => {
  const gw = parseInt(document.getElementById('pickGw').value);
  const teamId = document.getElementById('pickTeam').value;
  const result = document.getElementById('pickResult').value || null;
  if (!gw || !teamId) { alert('Enter gameweek and select a team.'); return; }
  await postJson(`/api/lms/games/${currentGameId}/picks`, {
    gameweek: gw, team_id: teamId, result,
  });
  document.getElementById('pickGw').value = '';
  document.getElementById('pickTeam').value = '';
  document.getElementById('pickResult').value = '';
  await loadGames();
});

// ---- Init ----

(async function init() {
  await loadTeams();
  await loadGames();
})();
</script>

</body>
</html>

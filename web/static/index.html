<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMS — Elo vs Market</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d28;
      --border: #2a2d3a;
      --text: #e1e4ec;
      --muted: #8b8fa3;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header h1 span { color: var(--accent); }
    .header .meta {
      font-size: 12px;
      color: var(--muted);
    }

    .container {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .date-group-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 24px 0 10px;
      padding-left: 4px;
    }

    .fixture-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .fixture-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .fixture-teams {
      font-size: 15px;
      font-weight: 600;
    }
    .fixture-meta {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .fixture-time {
      font-size: 12px;
      color: var(--muted);
    }
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-pinn { background: rgba(59,130,246,0.15); color: var(--accent); }
    .badge-b365 { background: rgba(234,179,8,0.15); color: var(--yellow); }

    .odds-grid {
      display: grid;
      grid-template-columns: 100px 1fr 1fr 1fr;
      font-size: 13px;
    }
    .odds-grid .label-col {
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-weight: 500;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .odds-grid .outcome-col {
      text-align: center;
      padding: 10px 8px;
      border-left: 1px solid var(--border);
    }
    .odds-grid .outcome-header {
      font-weight: 700;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 8px;
      text-align: center;
      border-left: 1px solid var(--border);
    }
    .odds-grid .header-label {
      padding: 10px 16px;
      font-size: 11px;
      color: var(--muted);
    }

    .row-market { background: var(--card); }
    .row-model  { background: rgba(59,130,246,0.04); }
    .row-diff   { background: rgba(59,130,246,0.08); border-top: 1px solid var(--border); }

    .row-market .outcome-col { font-variant-numeric: tabular-nums; }
    .row-model  .outcome-col { font-variant-numeric: tabular-nums; font-weight: 600; }
    .row-diff   .outcome-col { font-variant-numeric: tabular-nums; font-weight: 600; }

    .diff-pos { color: var(--green); }
    .diff-neg { color: var(--red); }
    .diff-neutral { color: var(--muted); }

    .elo-badges {
      display: flex;
      justify-content: space-between;
      padding: 6px 16px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }
    .elo-badges span em {
      font-style: normal;
      color: var(--text);
      font-weight: 600;
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .odds-grid { grid-template-columns: 70px 1fr 1fr 1fr; }
      .odds-grid .label-col, .odds-grid .header-label { padding: 0 8px; font-size: 10px; }
      .fixture-teams { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1><span>LMS</span> &mdash; Elo vs Market</h1>
  <div class="meta" id="headerMeta"></div>
</div>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    Loading fixtures&hellip;
  </div>
</div>

<script>
(async function () {
  const app = document.getElementById('app');
  const meta = document.getElementById('headerMeta');

  try {
    const res = await fetch('/api/fixtures');
    const data = await res.json();

    if (data.error) {
      app.innerHTML = `<div class="empty">${data.error}</div>`;
      return;
    }

    const fixtures = data.fixtures || [];
    if (!fixtures.length) {
      app.innerHTML = '<div class="empty">No upcoming fixtures with Pinnacle or Bet365 odds.</div>';
      return;
    }

    meta.textContent = `${fixtures.length} fixture${fixtures.length > 1 ? 's' : ''} · HFA ${data.model.hfa} · Draw boundary ${data.model.draw_boundary}`;

    // Group by date
    const grouped = {};
    for (const f of fixtures) {
      const d = new Date(f.kickoff);
      const key = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      (grouped[key] = grouped[key] || []).push(f);
    }

    let html = '';
    for (const [dateLabel, fxs] of Object.entries(grouped)) {
      html += `<div class="date-group-label">${dateLabel}</div>`;
      for (const f of fxs) {
        const time = new Date(f.kickoff).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        const srcKey = f.source.includes('pinnacle') ? 'pinn' : 'b365';
        const srcLabel = f.source.includes('pinnacle') ? 'Pinnacle' : 'Bet365';

        const diffClass = (v) => v > 1.5 ? 'diff-pos' : v < -1.5 ? 'diff-neg' : 'diff-neutral';
        const diffFmt = (v) => (v > 0 ? '+' : '') + v.toFixed(1) + '%';
        const pctFmt = (v) => v.toFixed(1) + '%';

        html += `
        <div class="fixture-card">
          <div class="fixture-header">
            <div class="fixture-teams">${f.home_team} v ${f.away_team}</div>
            <div class="fixture-meta">
              <span class="badge badge-${srcKey}">${srcLabel}</span>
              <span class="fixture-time">${time}</span>
            </div>
          </div>

          <div class="odds-grid">
            <div class="header-label"></div>
            <div class="outcome-header">Home</div>
            <div class="outcome-header">Draw</div>
            <div class="outcome-header">Away</div>

            <div class="label-col">Market</div>
            <div class="outcome-col row-market">${pctFmt(f.market.home)}</div>
            <div class="outcome-col row-market">${pctFmt(f.market.draw)}</div>
            <div class="outcome-col row-market">${pctFmt(f.market.away)}</div>

            <div class="label-col" style="color:var(--accent)">Model</div>
            <div class="outcome-col row-model">${pctFmt(f.model.home)}</div>
            <div class="outcome-col row-model">${pctFmt(f.model.draw)}</div>
            <div class="outcome-col row-model">${pctFmt(f.model.away)}</div>

            <div class="label-col">Edge</div>
            <div class="outcome-col row-diff ${diffClass(f.diff.home)}">${diffFmt(f.diff.home)}</div>
            <div class="outcome-col row-diff ${diffClass(f.diff.draw)}">${diffFmt(f.diff.draw)}</div>
            <div class="outcome-col row-diff ${diffClass(f.diff.away)}">${diffFmt(f.diff.away)}</div>
          </div>

          <div class="elo-badges">
            <span>${f.home_team.split(' ').pop()} <em>${f.home_elo}</em></span>
            <span><em>${f.away_elo}</em> ${f.away_team.split(' ').pop()}</span>
          </div>
        </div>`;
      }
    }

    app.innerHTML = html;

  } catch (err) {
    app.innerHTML = `<div class="empty">Failed to load data: ${err.message}</div>`;
  }
})();
</script>

</body>
</html>
